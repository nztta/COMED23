<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Payment Verification and Transparency Portal">
    <title>COMED23</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script>
        // Apply theme immediately to prevent FOUC (flash of unstyled content)
        (function () {
            const applyTheme = (theme) => {
                document.documentElement.setAttribute('data-theme', theme);
            };
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                applyTheme(savedTheme);
            } else {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(systemPrefersDark ? 'dark' : 'light');
            }
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });
        })();
    </script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <style>
        /* Specific Styles for Public Portal */
        .portal-container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .portal-header h1 {
            font-size: 2.25rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .portal-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .verification-card {
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 2.5rem;
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-glass);
        }

        .hidden {
            display: none !important;
        }

        /* Monthly tabs list */
        .months-tab-wrapper {
            display: flex;
            overflow-x: auto;
            gap: 0.75rem;
            padding: 0.5rem 0;
            margin-bottom: 2rem;
            scrollbar-width: thin;
        }

        .month-tab {
            flex: 0 0 auto;
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--border-glass);
            background-color: var(--bg-secondary);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            position: relative;
            transition: all var(--transition-fast);
        }

        .month-tab.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-shadow);
        }

        .month-tab-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .month-tab-year {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .month-tab .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            bottom: 6px;
        }

        /* Color indicators for Month Tabs */
        .tab-color-green {
            background-color: var(--status-green-bg);
            color: var(--status-green-text);
        }

        .tab-color-green .status-dot {
            background-color: var(--status-green-text);
        }

        .tab-color-yellow {
            background-color: var(--status-yellow-bg);
            color: var(--status-yellow-text);
        }

        .tab-color-yellow .status-dot {
            background-color: var(--status-yellow-text);
        }

        .tab-color-red {
            background-color: var(--status-red-bg);
            color: var(--status-red-text);
        }

        .tab-color-red .status-dot {
            background-color: var(--status-red-text);
        }

        .tab-color-gray {
            background-color: var(--status-gray-bg);
            color: var(--status-gray-text);
        }

        .tab-color-gray .status-dot {
            background-color: var(--status-gray-text);
        }

        /* Weekly statuses */
        .weeks-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .week-status-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius-md);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: all var(--transition-fast);
        }

        .border-color-green {
            border-left: 4px solid var(--status-green-text);
        }

        .border-color-yellow {
            border-left: 4px solid var(--status-yellow-text);
        }

        .border-color-red {
            border-left: 4px solid var(--status-red-text);
        }

        .border-color-gray {
            border-left: 4px solid var(--status-gray-text);
        }

        .week-number {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .week-amount {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: var(--font-heading);
        }

        .week-due {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Payment form styling */
        .payment-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .payment-form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-mode-selectors {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .mode-label {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius-sm);
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--bg-secondary);
        }

        .mode-label input {
            accent-color: var(--accent);
        }

        .week-checkboxes-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .checkbox-label-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius-sm);
            background-color: var(--bg-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .checkbox-label-card input {
            display: none;
        }

        .checkbox-box {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .checkbox-label-card input:checked+.checkbox-box {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .check-indicator {
            color: white;
            font-size: 0.8rem;
            display: none;
        }

        .checkbox-label-card input:checked+.checkbox-box .check-indicator {
            display: block;
        }

        .checkbox-text {
            display: flex;
            flex-direction: column;
        }

        .checkbox-week {
            font-weight: 600;
        }

        .checkbox-subtext {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* File Upload styling */
        .upload-dropzone {
            border: 2px dashed var(--border-glass);
            border-radius: var(--border-radius-md);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            background-color: var(--bg-primary);
            transition: all var(--transition-fast);
            position: relative;
        }

        .upload-dropzone:hover {
            border-color: var(--accent);
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .slip-preview-img {
            max-width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: var(--border-radius-sm);
        }

        .slip-preview-pdf {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .pdf-icon {
            font-size: 3rem;
        }

        .pdf-filename {
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Success receipt modal overrides */
        .receipt-card {
            border: 1px dashed var(--border-glass);
            border-radius: var(--border-radius-sm);
            padding: 1.5rem;
            background-color: var(--bg-primary);
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .receipt-row.total {
            border-top: 1px solid var(--border-glass);
            padding-top: 0.5rem;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <!-- Floating Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle-btn floating-theme-toggle" aria-label="Toggle Theme"><svg
            xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg></button>

    <!-- Apple-style Liquid Animation background -->
    <div class="liquid-bg-container">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
        <div class="liquid-blob blob-3"></div>
    </div>

    <div class="portal-container">

        <header class="portal-header">
            <img src="logo.png" alt="COMED23 Logo"
                style="max-height: 180px; width: auto; max-width: 100%; display: block; margin: 0 auto;">
        </header>
        <!-- Unified Student Verification Card -->
        <section class="verification-card"
            style="max-width: 480px; margin: 0 auto; background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: var(--border-radius-md); padding: 2.5rem 2rem; box-shadow: var(--shadow-glass); transition: all var(--transition-normal);">

            <h2
                style="font-family: var(--font-heading); font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; color: var(--text-primary);">
                เข้าสู่ระบบ
            </h2>

            <form id="unified-login-form">
                <div class="form-group">
                    <label for="login-identity">รหัสประจำตัวนักศึกษา</label>
                    <input type="text" id="login-identity" class="form-control" placeholder="เช่น 69xxxxxxx-x" required
                        autocomplete="username">
                </div>

                <div class="form-group" style="margin-top: 1.25rem;">
                    <label for="login-credential">รหัสผ่าน</label>
                    <div style="position: relative;">
                        <input type="password" id="login-credential" class="form-control" placeholder="กรอกรหัสผ่าน"
                            required autocomplete="current-password" style="padding-right: 2.75rem; width: 100%;">
                        <button type="button" id="toggle-password-btn"
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; font-size: 1.1rem; z-index: 10;"
                            title="แสดง/ซ่อนรหัสผ่าน">
                            <i class="far fa-eye" id="password-toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options"
                    style="display: flex; align-items: center; margin-top: 1.25rem; padding-left: 0.25rem;">
                    <label
                        style="display: flex; align-items: center; gap: 0.65rem; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; user-select: none;">
                        <input type="checkbox" id="remember-me"
                            style="width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;">
                        <span>จดจำการเข้าสู่ระบบ (Remember Me)</span>
                    </label>
                </div>

                <button type="submit" id="login-submit-btn" class="btn btn-primary"
                    style="width: 100%; margin-top: 2rem; justify-content: center; padding: 0.85rem; font-family: var(--font-heading); font-weight: 600; font-size: 1.05rem; letter-spacing: 0.5px;">
                    เข้าสู่ระบบ
                </button>
            </form>

            <!-- Error Alerts Box -->
            <div id="login-alert" class="alert-error"
                style="margin-top: 1.5rem; background-color: var(--status-red-bg); color: var(--status-red-text); border: 1px solid var(--status-red-border); padding: 0.75rem 1rem; border-radius: var(--border-radius-sm); font-size: 0.85rem; display: none;">
            </div>

        </section>
    </div>

    <!-- Global Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Core Configurations -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <!-- Page Logic -->
    <script src="js/login.js" defer></script>
</body>

</html>
