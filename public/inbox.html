<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กล่องข้อความแจ้งเตือน | COMED23</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styling stylesheet -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <script>
        // Apply theme immediately to prevent FOUC (flash of unstyled content)
        (function() {
            const applyTheme = (theme) => {
                document.documentElement.setAttribute('data-theme', theme);
            };
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                applyTheme(savedTheme);
            } else {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(systemPrefersDark ? 'dark' : 'light');
            }
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });
        })();
    </script>

    <style>
        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }

        .portal-container {
            max-width: 100%;
            margin: 1.5rem;
            padding: 0;
            width: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-glass);
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .top-bar-logo {
            height: 40px;
            width: auto;
        }

        .top-bar-title {
            font-size: 1.25rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--font-heading);
        }

        .inbox-card-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 1.5rem;
        }

        .inbox-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            display: flex;
            gap: 1.25rem;
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .inbox-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.1), var(--shadow-glass);
        }

        /* Unread indicator styling */
        .inbox-item.unread {
            border-left: 4px solid var(--accent);
            background: var(--bg-glass);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.05);
        }

        .inbox-item.unread::before {
            content: '';
            position: absolute;
            top: 15px;
            right: 15px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .inbox-icon-container {
            width: 48px;
            height: 48px;
            border-radius: var(--border-radius-md);
            background: rgba(249, 115, 22, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            color: var(--accent);
            flex-shrink: 0;
            transition: all var(--transition-fast);
        }

        .inbox-item:hover .inbox-icon-container {
            transform: scale(1.08) rotate(5deg);
        }

        /* Status Colors */
        .icon-type-approval {
            background: rgba(34, 197, 94, 0.1) !important;
            color: #22c55e !important;
        }
        .icon-type-rejection {
            background: rgba(239, 68, 68, 0.1) !important;
            color: #ef4444 !important;
        }
        .icon-type-cancellation {
            background: rgba(100, 116, 139, 0.1) !important;
            color: #64748b !important;
        }

        .inbox-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .inbox-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-heading);
        }

        .inbox-date {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .inbox-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .inbox-footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            border-top: 1px dashed var(--border-glass);
            padding-top: 0.5rem;
        }

        .inbox-author {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .badge-cancelled {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.2rem 0.6rem;
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: var(--border-radius-sm);
        }

        .badge-read {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 0.2rem 0.6rem;
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: var(--border-radius-sm);
        }

        /* Empty state design */
        .empty-inbox-state {
            text-align: center;
            padding: 5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
        }

        .empty-icon-pulse {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(249, 115, 22, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            position: relative;
            animation: pulse-ring 2s infinite ease-in-out;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.2);
                transform: scale(1);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(249, 115, 22, 0);
                transform: scale(1.05);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0);
                transform: scale(1);
            }
        }

        .empty-inbox-state h3 {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            color: var(--text-primary);
            margin: 0;
        }

        .empty-inbox-state p {
            font-size: 0.9rem;
            color: var(--text-muted);
            max-width: 400px;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Background Blob Decorator -->
    <div class="liquid-bg-container">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
    </div>

    <div class="portal-container">
        <header class="top-bar">
            <div class="top-bar-left">
                <img src="logo.png" alt="Logo" class="top-bar-logo">
                <span class="top-bar-title">COMED23</span>
                <span style="font-size: 0.9rem; color: var(--text-secondary); margin-left: 0.5rem;">| กล่องข้อความแจ้งเตือน</span>
            </div>
            <div class="top-bar-right">
                <button onclick="goBack()" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
                </button>
            </div>
        </header>

        <main style="max-width: 800px; margin: 2rem auto; padding: 0 1rem;">
            <div class="card" style="background: var(--bg-glass); padding: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-glass); padding-bottom: 1rem;">
                    <h1 style="font-size: 1.6rem; font-family: var(--font-heading); display: flex; align-items: center; gap: 0.5rem; margin: 0; color: var(--text-primary);">
                        <i class="fas fa-inbox" style="color: var(--accent);"></i> กล่องข้อความของคุณ
                    </h1>
                    <button id="mark-all-read-btn" class="btn btn-secondary btn-sm" style="font-size: 0.8rem; display: none; align-items: center; gap: 0.35rem;">
                        <i class="fas fa-check-double"></i> อ่านทั้งหมดแล้ว
                    </button>
                </div>

                <div id="inbox-list" class="inbox-card-container">
                    <div class="text-center text-muted" style="padding: 3rem;">กำลังโหลดการแจ้งเตือน...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Full Details Modal -->
    <div id="inbox-detail-modal" class="modal-backdrop">
        <div class="modal-content" style="max-width: 540px; background: var(--bg-glass); border: 1px solid var(--border-glass);">
            <div class="modal-header" style="border-bottom: 1px solid var(--border-glass); padding-bottom: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <span id="detail-tag" class="badge-cancelled" style="display: none;">ยกเลิกแล้ว</span>
                        <span id="detail-date" style="font-size: 0.75rem; color: var(--text-muted);">วันที่</span>
                    </div>
                    <h2 id="detail-title" style="font-family: var(--font-heading); color: var(--text-primary); font-size: 1.3rem; margin: 0; margin-top: 0.5rem; line-height: 1.4;">
                        หัวเรื่องแจ้งเตือน
                    </h2>
                </div>
                <button id="close-modal-x" class="modal-close-btn" style="background: none; border: none; font-size: 1.5rem; color: var(--text-secondary); cursor: pointer; align-self: flex-start;">&times;</button>
            </div>
            <div class="modal-body" style="padding: 1.5rem 0; line-height: 1.6; color: var(--text-primary); font-size: 0.95rem; white-space: pre-line;" id="detail-message">
                เนื้อหาแจ้งเตือนรายละเอียด...
            </div>
            <div id="detail-action-container" style="display: flex; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--border-glass); gap: 0.75rem;">
                <a id="detail-go-payment-btn" href="student.html" class="btn btn-primary" style="text-decoration: none; padding: 0.6rem 1.5rem; font-size: 0.9rem;">
                    <i class="fas fa-file-invoice-dollar"></i> ชำระเงินทันที
                </a>
                <button type="button" id="close-detail-btn" class="btn btn-secondary" style="padding: 0.6rem 1.5rem; cursor: pointer;">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <!-- Core configurations and JS script -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let notifications = [];

        function goBack() {
            // Check session to route appropriately
            const isGuest = localStorage.getItem('guest_mode') === 'true';
            const studentSession = localStorage.getItem('student_session');
            if (isGuest || studentSession) {
                window.location.href = 'student.html';
            } else {
                window.location.href = 'admin.html';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadInboxNotifications();

            // Setup modal closing
            const modal = document.getElementById('inbox-detail-modal');
            const closeX = document.getElementById('close-modal-x');
            const closeBtn = document.getElementById('close-detail-btn');
            
            const closeModal = () => modal.classList.remove('active');
            if (closeX) closeX.onclick = closeModal;
            if (closeBtn) closeBtn.onclick = closeModal;

            // Setup mark all read button listener
            const markAllBtn = document.getElementById('mark-all-read-btn');
            if (markAllBtn) {
                markAllBtn.addEventListener('click', async () => {
                    try {
                        const response = await fetch(`${CONFIG.API_BASE_URL}/notifications.php?action=mark_all_read`, {
                            method: 'POST',
                            headers: getAuthHeaders()
                        });
                        const result = await response.json();
                        if (result.status === 'success') {
                            notifications.forEach(n => n.is_read = true);
                            renderInboxList();
                        } else {
                            alert('ไม่สามารถอัปเดตสถานะได้: ' + result.message);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                });
            }
        });

        async function loadInboxNotifications() {
            const listContainer = document.getElementById('inbox-list');
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/notifications.php?action=my_notifications`, {
                    headers: getAuthHeaders()
                });
                const result = await response.json();
                if (result.status === 'success') {
                    notifications = result.data || [];
                    renderInboxList();
                } else {
                    listContainer.innerHTML = `<div class="text-center text-muted" style="padding: 3rem;">ล้มเหลวในการโหลดข้อมูล: ${result.message}</div>`;
                }
            } catch (e) {
                listContainer.innerHTML = `<div class="text-center text-muted" style="padding: 3rem;">เครือข่ายขัดข้อง ไม่สามารถติดต่อระบบแจ้งเตือนได้</div>`;
                console.error(e);
            }
        }

        function renderInboxList() {
            const listContainer = document.getElementById('inbox-list');
            const markAllBtn = document.getElementById('mark-all-read-btn');
            listContainer.innerHTML = '';

            // Toggle Mark All Read button based on unread counts
            const hasUnread = notifications.some(n => !n.is_read);
            if (markAllBtn) {
                markAllBtn.style.display = hasUnread ? 'inline-flex' : 'none';
            }

            if (notifications.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-inbox-state">
                        <div class="empty-icon-pulse">
                            <i class="far fa-bell"></i>
                        </div>
                        <h3>ไม่มีข้อความในกล่องข้อความ</h3>
                        <p>คุณจะได้รับข้อความแจ้งเตือนเมื่อฝ่ายการเงินส่งแจ้งยอดเรียกเก็บเงินหรือแจ้งตรวจสอบสลิป</p>
                    </div>
                `;
                return;
            }

            notifications.forEach((n, idx) => {
                const item = document.createElement('div');
                item.className = `inbox-item ${!n.is_read ? 'unread' : ''}`;
                item.style.animationDelay = `${idx * 0.05}s`;
                
                const createdDate = new Date(n.created_at).toLocaleString('th-TH', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                let icon = '<i class="fas fa-bell"></i>';
                let iconClass = '';
                
                if (n.type === 'Approval' || n.type === 'SlipApproved') {
                    icon = '<i class="fas fa-check-circle"></i>';
                    iconClass = 'icon-type-approval';
                } else if (n.type === 'Rejection' || n.type === 'SlipRejected') {
                    icon = '<i class="fas fa-exclamation-circle"></i>';
                    iconClass = 'icon-type-rejection';
                } else if (n.is_cancelled) {
                    icon = '<i class="fas fa-ban"></i>';
                    iconClass = 'icon-type-cancellation';
                } else if (n.type === 'BudgetChange' || n.type === 'MonthClosed') {
                    icon = '<i class="fas fa-file-invoice-dollar"></i>';
                }

                item.innerHTML = `
                    <div class="inbox-icon-container ${iconClass}">
                        ${icon}
                    </div>
                    <div class="inbox-main">
                        <div class="inbox-header">
                            <span class="inbox-title" style="${n.is_cancelled ? 'text-decoration: line-through; color: var(--text-muted);' : ''}">${n.title}</span>
                            <span class="inbox-date">${createdDate}</span>
                        </div>
                        <div class="inbox-message">${n.message}</div>
                        <div class="inbox-footer-row">
                            <span class="inbox-author">
                                <i class="fas fa-user-shield" style="font-size: 0.7rem; color: var(--text-muted);"></i> 
                                ผู้ลงประกาศ: ${n.author_name || 'ระบบอัตโนมัติ'}
                            </span>
                            <div style="display: flex; gap: 0.5rem; align-items: center;">
                                ${n.is_cancelled ? '<span class="badge-cancelled">ยกเลิกแล้ว</span>' : ''}
                                ${!n.is_read ? '<span class="badge-read" style="background: rgba(249, 115, 22, 0.1); color: var(--accent); border-color: rgba(249,115,22,0.2);">ใหม่</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;

                item.addEventListener('click', () => {
                    openNotificationDetail(n);
                    if (!n.is_read) {
                        markNotificationAsRead(n.id);
                    }
                });

                listContainer.appendChild(item);
            });
        }

        function openNotificationDetail(n) {
            const modal = document.getElementById('inbox-detail-modal');
            const titleEl = document.getElementById('detail-title');
            const dateEl = document.getElementById('detail-date');
            const messageEl = document.getElementById('detail-message');
            const tagEl = document.getElementById('detail-tag');
            const paymentBtn = document.getElementById('detail-go-payment-btn');

            titleEl.textContent = n.title;
            dateEl.textContent = new Date(n.created_at).toLocaleString('th-TH');
            messageEl.textContent = n.message;

            if (n.is_cancelled) {
                tagEl.style.display = 'inline-block';
                tagEl.textContent = 'รายการนี้ถูกยกเลิกแล้ว';
                if (paymentBtn) paymentBtn.style.display = 'none';
            } else {
                tagEl.style.display = 'none';
                if (paymentBtn) {
                    paymentBtn.style.display = 'inline-flex';
                    if (n.setting_id) {
                        paymentBtn.href = `student.html?pay_setting_id=${n.setting_id}`;
                    } else {
                        paymentBtn.href = n.target_page || 'student.html';
                    }
                }
            }

            modal.classList.add('active');
        }

        async function markNotificationAsRead(id) {
            try {
                await fetch(`${CONFIG.API_BASE_URL}/notifications.php?action=mark_read`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({ id: id })
                });
                
                // Set local state read
                const notif = notifications.find(x => x.id === id);
                if (notif) notif.is_read = true;
                renderInboxList();
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
