<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Finance Portal Administrative Authentication Login">
    <title>Staff Authentication Login - COMED23</title>
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius-md);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .alert-error {
            background-color: var(--status-red-bg);
            color: var(--status-red-text);
            border: 1px solid var(--status-red-border);
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius-sm);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="login-card">
            
            <div class="login-header">
                <h1>COMED23</h1>
                <p>Administrative and Financial Logs Login</p>
            </div>

            <div id="login-alert" class="alert-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="staff@school.com" required>
                </div>
                
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 2rem; justify-content: center; padding: 0.85rem;">
                    Authenticate Session
                </button>
            </form>

        </div>

    </div>

    <!-- Supabase JS Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Config and Auth Helpers -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const alertBox = document.getElementById('login-alert');
            const submitBtn = document.getElementById('submit-btn');

            alertBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';

            try {
                // Call Auth JS Helper signIn
                await signIn(email, password);
                
                // On Success: Validate Role against Postgres backend
                const profile = await checkAuthState(false);
                if (profile) {
                    // Forward user to administration dashboard panel
                    window.location.href = 'admin.html';
                } else {
                    alertBox.textContent = 'Account exists but lacks verified database profile configuration.';
                    alertBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Authenticate Session';
                }
            } catch (error) {
                alertBox.textContent = error.message || 'Authentication failed. Please check credentials.';
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Authenticate Session';
            }
        });

        // If already logged in, redirect straight to admin panel
        (async () => {
            try {
                const token = localStorage.getItem('sb_access_token');
                if (token) {
                    const client = getSupabaseClient();
                    if (client) {
                        const { data: { session } } = await client.auth.getSession();
                        if (session) {
                            window.location.href = 'admin.html';
                        }
                    }
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
